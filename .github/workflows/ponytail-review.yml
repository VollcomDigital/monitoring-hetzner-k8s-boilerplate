name: Ponytail review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ponytail-lint:
    if: github.event.pull_request.draft == false
    uses: VollcomDigital/vollcom-digital-github/.github/workflows/reusable-ponytail-lint.yml@main
    with:
      base_ref: ${{ github.base_ref }}
      head_ref: ${{ github.head_ref }}
      pr_number: ${{ github.event.pull_request.number }}

  ponytail-review:
    if: github.event.pull_request.draft == false
    needs: ponytail-lint
    uses: VollcomDigital/vollcom-digital-github/.github/workflows/reusable-ponytail-review.yml@main
    with:
      base_ref: ${{ github.base_ref }}
      head_ref: ${{ github.head_ref }}
      pr_number: ${{ github.event.pull_request.number }}
      fail_net_lines: "20"
      fail_on_findings: true
    secrets:
      OCR_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
